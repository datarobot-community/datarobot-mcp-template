---
# https://taskfile.dev
version: '3'

tasks:
  install:
    desc: "🔧 Install dependencies"
    cmds:
      - echo "🔧 Installing dependencies.."
      - uv sync --all-extras --dev

  lint:
    silent: true
    desc: "🧹 Run linters"
    cmds:
      - echo "🧹 Running linters.."
      - uv run ruff format .
      - uv run ruff check . --fix
      - uv run mypy --pretty .

  lint-check:
    silent: true
    desc: "🧹 Check whether the codebase is linted"
    cmds:
      - uv run ruff format --check .
      - uv run ruff check .
      - uv run mypy --pretty .

  init:
    silent: true
    desc: "🆕 Initialize a new Pulumi stack"
    cmds:
      - uv run pulumi stack init

  up:
    silent: true
    aliases: [deploy]
    desc: "🔨 Deploy the infrastructure"
    cmds:
      - echo "🔨 Deploying the infrastructure.."
      - task generate-docker-requirement-file
      - uv run pulumi up

  info:
    silent: true
    desc: "ℹ️ Show Pulumi stack info"
    cmds:
      - uv run pulumi stack

  down:
    silent: true
    aliases: [destroy]
    desc: "💥 Destroy the deployed infrastructure"
    cmds:
      - echo "💥 Destroying the infrastructure.."
      - uv run pulumi down

  copyright:
    aliases: [license]
    desc: 📜 Apply license headers
    cmds:
      - echo "📜 Applying license headers"
      - docker run  --rm -v $PWD:/github/workspace ghcr.io/apache/skywalking-eyes/license-eye:eb0e0b091ea41213f712f622797e37526ca1e5d6
        -v info -c .licenserc.yaml header fix #magic___^_^___line

  copyright-check:
    aliases: [license-check]
    desc: 📜 Checking for license headers
    cmds:
      - echo "📜 Checking license headers"
      - docker run  --rm -v $PWD:/github/workspace ghcr.io/apache/skywalking-eyes/license-eye:eb0e0b091ea41213f712f622797e37526ca1e5d6
        -v info -c .licenserc.yaml header check #magic___^_^___line

  generate-docker-requirement-file:
    desc: "🔨 Generate docker requirements.txt file"
    cmds:
      - echo "🔨 Generating docker requirements.txt file..."
      # Until the dr-mcp-server-lib isn't release on PyPI, we copy the code of the lib into the custom model and add it to the
      # PYTHONPATH manually.
      # If the content of the requirement.txt file doesn't change, we don't want to re-write it as it will trigger an update of
      - uv export --format requirements-txt --no-emit-project --project ../dr_mcp | sed '/^\.\.\/\.internal\/dr-mcp-server-lib$/d'
        > ./docker/requirements.txt.tmp && if ! cmp -s ./docker/requirements.txt.tmp ./docker/requirements.txt; then mv ./docker/requirements.txt.tmp
        ./docker/requirements.txt; else rm ./docker/requirements.txt.tmp; fi

    silent: true
